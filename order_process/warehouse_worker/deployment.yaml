apiVersion: apps/v1
kind: Deployment
metadata:
  name: warehouse-worker
spec:
  replicas: 10
  selector:
    matchLabels:
      pass.subject: warehouse-worker
  template:
    metadata:
      labels:
        pass.subject: warehouse-worker
    spec:
      restartPolicy: Always
      containers:
        - name: subject-behavior
          image: warehouse_worker:latest
          imagePullPolicy: Never
          command: ["python", "/app/behavior.py"]
          env:
            - name: SUBJECT_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            - name: PROCESS_INSTANCE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace

        - name: input-pool
          image: input_pool:latest
          imagePullPolicy: Never
          command: ["input-pool"]
          ports:
            - containerPort: 8081
            - containerPort: 8080
